description: Starbucks does not operate a public developer or partner API program with published pricing.
  Integrations (loyalty, ordering, mobile) are handled through B2B engagements (e.g. through Starbucks
  Technology, Tech Ventures, and licensee/partner channels) under custom contracts. No published plan
  data is available to reconcile.
sources:
  - https://www.starbucks.com/business
notes: No public pricing page or developer portal located. Plans were trimmed to a single contact-sales
  entry pending direct partner engagement.
plans:
  - id: starbucks-contact-sales
    name: Contact Sales
    type: enterprise
    description: All Starbucks API access is negotiated directly through Starbucks partnerships and licensee
      programs. Pricing, rate limits, and data terms are set per contract.
    entries:
      - label: Custom Engagement
        name: custom_engagement
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: configurable
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Custom Contract
      - name: Partner / Licensee Onboarding
