meters:
  - name: contracted_engagement
    description: Placeholder for contractual line items defined per partner agreement.
    unit: varies
    aggregation: sum
principles:
  - name: Visibility
    description: Visibility is whatever telemetry (usage reports, invoice line items) the partner contract
      with Starbucks Technology grants — there is no public usage API.
  - name: Allocation
    description: Cost allocation is contract-by-contract; tag the partnership engagement in your own
      ERP / cost system rather than relying on a Starbucks-provided breakdown.
  - name: Optimization
    description: Optimization happens at contract renewal, not via dynamic plan changes — there is no
      public pay-as-you-go surface to optimize against.
  - name: Accountability
    description: A single business owner of the Starbucks partnership relationship should own the engagement
      cost line and renewal cycle.
