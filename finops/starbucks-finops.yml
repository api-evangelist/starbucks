description: Starbucks does not operate a public, metered API program. There is no public price list,
  meter set, or invoice surface for API consumption — all integrations are private partner contracts
  outside the FOCUS-billable surface.
sources:
  - https://www.starbucks.com/business
notes: No public pricing or billing surface to reconcile. Meters, FOCUS columns, and principles are deferred
  until a partner contract defines them.
billingModel:
  pricingCategory: Contract
  billingFrequency: Per-Contract
  billingCurrency: USD
  chargeCategories:
    - Purchase
