naftiko: 1.0.0-alpha2
info:
  label: Starbucks API — Orders
  description: 'Starbucks API — Orders. 2 operations. Lead operation: Create Order. Self-contained Naftiko capability covering
    one Starbucks business surface.'
  tags:
  - Starbucks
  - Orders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STARBUCKS_API_KEY: STARBUCKS_API_KEY
capability:
  consumes:
  - type: http
    namespace: starbucks-orders
    baseUri: https://api.starbucks.com
    description: Starbucks API — Orders business capability. Self-contained, no shared references.
    resources:
    - name: v1-orders
      path: /v1/orders
      operations:
      - name: createorder
        method: POST
        description: Create Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-orders-orderId
      path: /v1/orders/{orderId}
      operations:
      - name: getorder
        method: GET
        description: Get Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orderId
          in: path
          type: string
          description: The unique identifier of the order
          required: true
    authentication:
      type: bearer
      token: '{{env.STARBUCKS_API_KEY}}'
  exposes:
  - type: rest
    namespace: starbucks-orders-rest
    port: 8080
    description: REST adapter for Starbucks API — Orders. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/orders
      name: v1-orders
      description: REST surface for v1-orders.
      operations:
      - method: POST
        name: createorder
        description: Create Order
        call: starbucks-orders.createorder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/orders/{orderid}
      name: v1-orders-orderid
      description: REST surface for v1-orders-orderId.
      operations:
      - method: GET
        name: getorder
        description: Get Order
        call: starbucks-orders.getorder
        with:
          orderId: rest.orderId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: starbucks-orders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Starbucks API — Orders. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-order
      description: Create Order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: starbucks-orders.createorder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-order
      description: Get Order
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: starbucks-orders.getorder
      with:
        orderId: tools.orderId
      outputParameters:
      - type: object
        mapping: $.
