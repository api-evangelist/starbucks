naftiko: 1.0.0-alpha2
info:
  label: Starbucks API — Status
  description: 'Starbucks API — Status. 1 operations. Lead operation: Get API Status. Self-contained Naftiko capability covering
    one Starbucks business surface.'
  tags:
  - Starbucks
  - Status
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STARBUCKS_API_KEY: STARBUCKS_API_KEY
capability:
  consumes:
  - type: http
    namespace: starbucks-status
    baseUri: https://api.starbucks.com
    description: Starbucks API — Status business capability. Self-contained, no shared references.
    resources:
    - name: status
      path: /status
      operations:
      - name: getstatus
        method: GET
        description: Get API Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.STARBUCKS_API_KEY}}'
  exposes:
  - type: rest
    namespace: starbucks-status-rest
    port: 8080
    description: REST adapter for Starbucks API — Status. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/status
      name: status
      description: REST surface for status.
      operations:
      - method: GET
        name: getstatus
        description: Get API Status
        call: starbucks-status.getstatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: starbucks-status-mcp
    port: 9090
    transport: http
    description: MCP adapter for Starbucks API — Status. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-api-status
      description: Get API Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: starbucks-status.getstatus
      outputParameters:
      - type: object
        mapping: $.
