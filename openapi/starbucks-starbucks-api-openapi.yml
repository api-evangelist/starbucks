openapi: 3.1.0
info:
  title: Starbucks API
  description: >-
    Starbucks provides partner APIs for ordering, loyalty program integration, store locations, and menu data. These APIs enable partners to integrate Starbucks ordering and rewards into their applications.
  version: '1.0'
  contact:
    name: Starbucks Developer Support
    url: https://developer.starbucks.com/
externalDocs:
  description: Documentation
  url: https://developer.starbucks.com/
servers:
  - url: https://api.starbucks.com
    description: Production
tags:
  - name: Food Service
    description: Food Service operations
security:
  - bearerAuth: []
paths:
  /status:
    get:
      operationId: getStatus
      summary: Get API status
      description: >-
        Returns the current status of the API.
      tags:
        - Food Service
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: string
        '401':
          description: Unauthorized
        '429':
          description: Too many requests
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
