description: Starbucks does not publish public API rate limits. Any request-rate, concurrency, or quota
  ceilings are governed by per-partner agreements signed through Starbucks Technology / partnership channels.
sources:
  - https://www.starbucks.com/business
responseCodes:
  throttled: 429
limits:
  - name: Partner-Negotiated Limits
    scope: contract
    metric: varies
    limit: 'set per partner agreement; not publicly documented'
    notes: Throttling, burst, and quota terms are defined in the executed integration contract.
policies:
  - name: Contractual Scoping
    description: Rate limit, retry, and SLA expectations are part of the negotiated partner agreement
      rather than a public developer policy.
